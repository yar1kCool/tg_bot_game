<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Змейка - игра в Telegram</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .game-container {
            text-align: center;
            background: #16213e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        canvas {
            border: 3px solid #0f3460;
            border-radius: 10px;
            background: #0f3460;
        }
        .score {
            color: #e94560;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .info {
            color: #fff;
            margin-top: 10px;
            font-size: 14px;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        @media (max-width: 500px) {
            canvas {
                width: 90vw;
                height: 90vw;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="score">Счёт: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="info">Управление: стрелки или свайпы</div>
    <button onclick="resetGame()">🔄 Новая игра</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    
    let snake = [{x: 10, y: 10}];
    let direction = {x: 0, y: 0};
    let food = {};
    let score = 0;
    let gameLoop;
    
    function randomFood() {
        food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };
        // Проверяем, не появилась ли еда на змейке
        for(let segment of snake) {
            if(segment.x === food.x && segment.y === food.y) {
                randomFood();
            }
        }
    }
    
    function draw() {
        // Очистка
        ctx.fillStyle = '#0f3460';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Рисуем змейку
        ctx.fillStyle = '#e94560';
        for(let segment of snake) {
            ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
        }
        
        // Рисуем еду
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
    }
    
    function update() {
        // Двигаем голову
        const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
        
        // Проверка столкновения со стенами
        if(head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
            gameOver();
            return;
        }
        
        // Проверка столкновения с собой
        for(let segment of snake) {
            if(head.x === segment.x && head.y === segment.y) {
                gameOver();
                return;
            }
        }
        
        snake.unshift(head);
        
        // Проверка съедания еды
        if(head.x === food.x && head.y === food.y) {
            score++;
            scoreElement.textContent = score;
            randomFood();
        } else {
            snake.pop();
        }
        
        draw();
    }
    
    function gameOver() {
        clearInterval(gameLoop);
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width/2, canvas.height/2);
        ctx.font = '16px Arial';
        ctx.fillText('Нажмите "Новая игра"', canvas.width/2, canvas.height/2 + 40);
    }
    
    function resetGame() {
        if(gameLoop) clearInterval(gameLoop);
        snake = [{x: 10, y: 10}];
        direction = {x: 0, y: 0};
        score = 0;
        scoreElement.textContent = score;
        randomFood();
        draw();
        gameLoop = setInterval(() => {
            if(direction.x !== 0 || direction.y !== 0) update();
        }, 100);
    }
    
    // Управление с клавиатуры
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowUp': if(direction.y === 0) { direction = {x: 0, y: -1}; } break;
            case 'ArrowDown': if(direction.y === 0) { direction = {x: 0, y: 1}; } break;
            case 'ArrowLeft': if(direction.x === 0) { direction = {x: -1, y: 0}; } break;
            case 'ArrowRight': if(direction.x === 0) { direction = {x: 1, y: 0}; } break;
        }
    });
    
    // Управление свайпами для мобильных устройств
    let touchStart = null;
    canvas.addEventListener('touchstart', (e) => {
        touchStart = e.touches[0];
    });
    canvas.addEventListener('touchend', (e) => {
        if(!touchStart) return;
        const dx = e.changedTouches[0].clientX - touchStart.clientX;
        const dy = e.changedTouches[0].clientY - touchStart.clientY;
        if(Math.abs(dx) > Math.abs(dy)) {
            if(dx > 0 && direction.x === 0) direction = {x: 1, y: 0};
            else if(dx < 0 && direction.x === 0) direction = {x: -1, y: 0};
        } else {
            if(dy > 0 && direction.y === 0) direction = {x: 0, y: 1};
            else if(dy < 0 && direction.y === 0) direction = {x: 0, y: -1};
        }
        touchStart = null;
    });
    
    // Запуск игры
    randomFood();
    draw();
    gameLoop = setInterval(() => {
        if(direction.x !== 0 || direction.y !== 0) update();
    }, 100);
</script>
</body>
</html>
